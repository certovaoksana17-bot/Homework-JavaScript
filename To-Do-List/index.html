<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="toDoList.css">
</head>

<body>
    <div class="todo-card">
        <h2>To-Do List</h2>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Какие планы?">
            <button id="addBtn">Добавить</button>
        </div>

        <div class="filters">
            <button data-filter="all" class="active">Все</button>
            <button data-filter="active">Активные</button>
            <button data-filter="completed">Выполненные</button>
        </div>
        <button id="clearAllBtn">Очистить все</button>

        <div id="todoList"></div>
    </div>
    <script src="toDoList.js"></script>
</body>

</html>
